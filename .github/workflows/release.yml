name: Release gem

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag and publish to RubyGems
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Check version
        id: check
        run: |
          version=$(ruby -Ilib -r factory_seeder/version -e 'puts FactorySeeder::VERSION')
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "Version $version already tagged - nothing to release"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $version"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Run specs
        if: steps.check.outputs.release == 'true'
        run: bundle exec rake

      - name: Create and push tag
        if: steps.check.outputs.release == 'true'
        run: |
          version="${{ steps.check.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$version" -m "Release v$version"
          git push origin "v$version"

      - name: Configure RubyGems OIDC
        if: steps.check.outputs.release == 'true'
        uses: rubygems/configure-rubygems-credentials@main

      - name: Build gem
        if: steps.check.outputs.release == 'true'
        run: gem build factory_seeder.gemspec

      - name: Push gem to RubyGems
        if: steps.check.outputs.release == 'true'
        run: gem push factory_seeder-${{ steps.check.outputs.version }}.gem

      - name: Create GitHub release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.check.outputs.version }}"
          gh release create "v$version" \
            --title "v$version" \
            --generate-notes \
            "factory_seeder-$version.gem"
