name: Release gem

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push:
    name: Build and push gem to RubyGems
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Verify tag matches gemspec version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          gem_version=$(ruby -Ilib -r factory_seeder/version -e 'puts FactorySeeder::VERSION')
          if [ "$tag" != "$gem_version" ]; then
            echo "::error::Tag v$tag does not match gemspec version $gem_version"
            exit 1
          fi

      - name: Run specs
        run: bundle exec rake

      - name: Release gem
        uses: rubygems/release-gem@v1
